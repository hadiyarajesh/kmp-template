# Builds the Android app and runs unit tests on push + pull requests.
name: Android build and test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    types: [ "opened", "reopened", "synchronize", "ready_for_review" ]

jobs:
  build:
    # Run this job only if the pull request is not a draft
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Build Android app and execute unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle # Enables Gradle caching for faster builds

      - name: Print project directory
        run: |
          echo "Current directory is: ${GITHUB_WORKSPACE}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Build Android app and run unit tests
        run: ./gradlew test

      # Upload test reports only if the test step fails
      - name: Archive test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-test-reports
          path: |
            ./**/build/reports/
            ./**/build/test-results/
