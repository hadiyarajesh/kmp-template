# Checks Kotlin formatting on push + pull requests.
name: Ktlint formatting

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
    types: [ "opened", "reopened", "synchronize", "ready_for_review" ]

jobs:
  format:
    # Run this job only if the pull request is not a draft
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Check Kotlin formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle # Enables Gradle caching for faster builds

      - name: Print project directory
        run: |
          echo "Current directory is: ${GITHUB_WORKSPACE}"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Run ktlint formatting
        run: ./gradlew ktlintFormat

      - name: Verify formatting did not change files
        run: git diff --exit-code
